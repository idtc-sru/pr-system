<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ปิดการร่วมกิจกรรม - โครงการพี่ชวนน้องเรียน</title>
    <!-- นำเข้าฟอนต์ Sarabun จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .announcement-card {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border-top: 6px solid #e74c3c; /* แถบสีแดงด้านบนสื่อถึงการปิดรับสมัคร */
        }
        .icon-closed {
            font-size: 56px;
            margin-bottom: 15px;
            line-height: 1;
        }
        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: 600;
        }
        h2 {
            color: #e74c3c;
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 600;
        }
        p {
            color: #555555;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .highlight {
            color: #2980b9;
            font-weight: 600;
        }
        .contact-info {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            font-size: 15px;
            color: #444;
            border: 1px solid #eeeeee;
        }
        .contact-info a {
            color: #1877f2; /* สีฟ้า Facebook */
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-top: 8px;
        }
        .contact-info a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="announcement-card">
        <div class="icon-closed">🔒</div>
        <h1>โครงการพี่ชวนน้องเรียน</h1>
        <h2>บัดนี้ได้ปิดการร่วมกิจกรรมแล้ว</h2>
        
        <p>
            ศูนย์นวัตกรรมและเทคโนโลยีดิจิทัล จะประมวลข้อมูลและบันทึกกิจกรรม<br>
            <span class="highlight">(ฐานกิจกรรมที่ 3 เทคโนโลยีสารสนเทศ 1 กิจกรรม)</span><br>
            ให้นักศึกษา ภายในวันที่ <strong>30 กรกฎาคม 2569</strong>
        </p>

        <div class="contact-info">
            ติดต่อสอบถามเพิ่มเติมได้ที่<br>
            <a href="https://www.facebook.com/search/top?q=IDTC" target="_blank">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" style="vertical-align: text-bottom; margin-right: 4px;">
                    <path d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951z"/>
                </svg>
                FB: IDTC : ศูนย์นวัตกรรมและเทคโนโลยีดิจิทัล
            </a>
        </div>
    </div>

</body>
</html>
